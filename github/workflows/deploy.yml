name: Sync to Hugging Face
on:
  push:
    branches: [main] # atau master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://xlvi-digital:$HF_TOKEN@huggingface.co/spaces/xlvi-digital/reptil-adventure-api main
